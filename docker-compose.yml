services:
  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perf-app-backend
    restart: unless-stopped
    ports:
      - "8082:80"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - backend-vendor:/var/www/vendor
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: performance_app
      DB_USERNAME: sail
      DB_PASSWORD: password
      PHP_MEMORY_LIMIT: 1024M
      SANCTUM_EXPIRATION: 1440
      YOJADWAL_ENABLED: "true"
      YOJADWAL_BASE_URL: http://yojadwal.yogya.com
      YOJADWAL_LOGIN_PATH: /api/login
      YOJADWAL_PRESENCE_PATH: /api/presence
      YOJADWAL_APP_CLIENT: Android-Mobile-App
      YOJADWAL_TOKEN: ""
      YOJADWAL_COOKIE: ""
      YOJADWAL_TIMEOUT: 10
      YOJADWAL_NIK_FIELD: username
      YOJADWAL_PASSWORD_FIELD: password
      YOJADWAL_SUCCESS_FIELD: success
      YOJADWAL_ALLOW_LOCAL_SUPERADMIN_FALLBACK: "true"
      TZ: Asia/Jakarta
    depends_on:
      - db
    networks:
      - app-network

  # React Frontend + Nginx Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: perf-app-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./backend:/var/www
    depends_on:
      - backend
    networks:
      - app-network

  # Database
  db:
    image: postgres:15
    container_name: perf-app-db
    restart: unless-stopped
    ports:
     - "5432:5432"
    environment:
      POSTGRES_DB: performance_app
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
      TZ: Asia/Jakarta
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  backend-vendor:

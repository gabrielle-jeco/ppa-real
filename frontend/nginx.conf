server {
    listen 80;
    index index.html;
    server_name localhost;
    root /usr/share/nginx/html;
    client_max_body_size 12m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), geolocation=(), microphone=()" always;

    location ~ /\.(?!well-known) {
        deny all;
    }

    # Handle React Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Laravel Backend (PHP-FPM)
    location ~ ^/api {
        fastcgi_pass backend:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_read_timeout 60s;
    }

    # Serve static files directly from Laravel storage (mounted via docker-compose)
    # Bypasses the need for a symlink which breaks across OS bounds.
    location /storage/ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        autoindex off;
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
    }
}
